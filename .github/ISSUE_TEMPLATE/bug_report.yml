name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: knet version
      description: Run `knet version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      description: Run `kubectl version --short`
      placeholder: "v1.30.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (amd64)
        - Linux (arm64)
        - Windows
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands to trigger the bug.
      placeholder: |
        1. knet scan -A
        2. ...
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full command output
      description: Include any error messages. Add `--verbose` flag if possible.
      render: shell
