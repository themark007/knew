linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - gofmt
    - misspell
    - unconvert

linters-settings:
  errcheck:
    # CLI writes to stdout/stderr — ignore unrecoverable write errors
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintln
      - fmt.Fprintf
      - (*text/tabwriter.Writer).Flush

issues:
  exclude-rules:
    # Allow long lines in template strings
    - path: internal/output/html.go
      linters: [lll]

run:
  timeout: 5m
  tests: true
